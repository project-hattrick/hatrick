name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    name: api (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - run: npm run build

  front:
    name: front (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: front/package-lock.json
      # React 19 peers across the Solana wallet stack need legacy resolution.
      - run: npm ci --legacy-peer-deps
      - run: npm run build
