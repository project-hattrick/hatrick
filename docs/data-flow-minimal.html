<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hatrick — Data hub · minimal · 1920×1080</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Geist+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --foreground:#f2f3f5;--muted:#8b8d94;--faint:#6c6e76;--neon:#aef019;
    --sans:'Inter',system-ui,sans-serif;--mono:'Geist Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#050506;color:var(--foreground);font-family:var(--sans);-webkit-font-smoothing:antialiased;}
  .stack{display:flex;flex-direction:column;align-items:center;}

  .frame{position:relative;width:1920px;height:1080px;overflow:hidden;background:#0a0b0d;}
  .frame::before{content:'';position:absolute;inset:0;background:radial-gradient(1100px 680px at 52% 54%,rgba(255,255,255,.025),transparent 72%);}

  .vtag{position:absolute;top:26px;left:50%;transform:translateX(-50%);z-index:9;font-family:var(--mono);font-size:13px;color:var(--neon);
    background:rgba(11,12,15,.6);border:1px solid rgba(174,240,25,.35);border-radius:999px;padding:6px 14px;}
  .badge{position:absolute;top:52px;left:64px;z-index:8;font-family:var(--mono);font-size:14px;letter-spacing:.26em;text-transform:uppercase;color:var(--faint);}
  .badge b{color:var(--neon);}
  .brandmark{position:absolute;top:52px;right:64px;z-index:8;display:flex;align-items:center;gap:10px;}
  .brandmark img{width:24px;height:auto;opacity:.9;}
  .brandmark span{font-weight:900;font-style:italic;letter-spacing:1px;font-size:15px;color:#dfe1e5;}
  h1{position:absolute;top:104px;left:64px;z-index:8;font-size:50px;font-weight:800;letter-spacing:-.02em;line-height:1.05;color:#eef0f2;}
  h1 .n{color:var(--neon);}

  .links{position:absolute;inset:0;z-index:3;width:100%;height:100%;}
  .cards{position:absolute;inset:0;z-index:4;}

  /* minimal node card — neutral, thin border, no glow */
  .card{position:absolute;border-radius:20px;background:#0f1114;border:1px solid rgba(255,255,255,.09);
    display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:5px;padding:20px;}
  .card .ic{width:52px;height:52px;border-radius:14px;display:grid;place-items:center;background:#15171b;border:1px solid rgba(255,255,255,.08);margin-bottom:5px;}
  .card .ic svg{width:27px;height:27px;color:#b8bac0;}
  .card .t{font-size:23px;font-weight:700;letter-spacing:-.01em;color:#eef0f2;}
  .card .s{font-size:14px;color:var(--faint);}
  .card .tag{position:absolute;top:14px;left:16px;font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);}
  /* green accent used ONLY on the engine + on-chain */
  .card.hero{border-color:rgba(174,240,25,.38);}
  .card.hero .ic{background:rgba(174,240,25,.09);border-color:rgba(174,240,25,.28);}
  .card.hero .ic svg{color:var(--neon);width:31px;height:31px;}
  .card.hero .t{font-size:29px;color:#fff;}
  .card.chain .ic svg{color:var(--neon);}

  /* fixed data label sitting on a wire */
  .pill{position:absolute;transform:translate(-50%,-50%);z-index:5;display:inline-flex;align-items:center;gap:9px;
    font-family:var(--mono);font-size:12px;letter-spacing:.09em;text-transform:uppercase;color:#a9abb2;
    background:#0c0e11;border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:7px 14px;white-space:nowrap;}
  .pill .dot{width:6px;height:6px;border-radius:50%;background:var(--faint);}
  .pill.accent{color:#cfe39a;border-color:rgba(174,240,25,.32);}
  .pill.accent .dot{background:var(--neon);}
  /* variation B · bare labels (no chip) */
  .b .pill{background:none;border:none;padding:0;color:#8b8d94;}
  .b .pill .dot{display:none;}
  .b .pill.accent{color:var(--neon);}

  .legend{position:absolute;left:64px;bottom:50px;z-index:8;display:flex;gap:24px;font-family:var(--mono);font-size:13px;color:var(--faint);align-items:center;}
  .legend b{display:inline-flex;align-items:center;gap:8px;color:#cfd0d4;font-weight:600;}
  .legend .d{width:9px;height:9px;border-radius:50%;}
</style>
</head>
<body>

<div class="stack">
  <section class="frame" data-var="A">
    <div class="vtag">A · minimal · data labels in chips</div>
    <div class="badge">How it <b>works</b></div>
    <div class="brandmark"><img src="assets/logo.png" alt=""/><span>HATRICK</span></div>
    <h1>One engine, <span class="n">every part of the game.</span></h1>
    <svg class="links" viewBox="0 0 1920 1080" preserveAspectRatio="none"></svg>
    <div class="cards"></div>
    <div class="legend"><b><span class="d" style="background:var(--faint)"></span>data</b><b><span class="d" style="background:var(--neon)"></span>on-chain</b></div>
  </section>

  <section class="frame b" data-var="B">
    <div class="vtag">B · minimal · bare labels</div>
    <div class="badge">How it <b>works</b></div>
    <div class="brandmark"><img src="assets/logo.png" alt=""/><span>HATRICK</span></div>
    <h1>One engine, <span class="n">every part of the game.</span></h1>
    <svg class="links" viewBox="0 0 1920 1080" preserveAspectRatio="none"></svg>
    <div class="cards"></div>
    <div class="legend"><b><span class="d" style="background:var(--faint)"></span>data</b><b><span class="d" style="background:var(--neon)"></span>on-chain</b></div>
  </section>
</div>

<script>
  const NS='http://www.w3.org/2000/svg';
  const ICON={
    feed:'<circle cx="12" cy="12" r="2.4" fill="currentColor"/><path d="M17 7a7 7 0 0 1 0 10M7 17A7 7 0 0 1 7 7M20 4a11 11 0 0 1 0 16M4 20A11 11 0 0 1 4 4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>',
    engine:'<circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="2"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>',
    watch:'<rect x="2" y="4" width="20" height="14" rx="2.5" fill="none" stroke="currentColor" stroke-width="2"/><path d="M10 8.5v5l4-2.5z" fill="currentColor"/><path d="M8 21h8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>',
    play:'<path d="M6 4h12v3a6 6 0 0 1-12 0z" fill="none" stroke="currentColor" stroke-width="2"/><path d="M6 5H3v2a3 3 0 0 0 3 3M18 5h3v2a3 3 0 0 1-3 3M9 15h6M8 20h8M12 13v2" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>',
    chain:'<path d="M9 12h6M8.5 8H7a4 4 0 0 0 0 8h1.5M15.5 8H17a4 4 0 0 1 0 8h-1.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>',
  };
  function el(t,a){const e=document.createElementNS(NS,t);for(const x in a)e.setAttribute(x,a[x]);return e;}
  function svgIcon(id){return `<svg viewBox="0 0 24 24">${ICON[id]}</svg>`;}

  const NODES=[
    {x:120,y:455,w:290,h:185,ic:'feed',tag:'Live feed · TxLINE',t:'The live match'},
    {x:800,y:435,w:320,h:225,ic:'engine',t:'Hatrick',s:'one live engine',cls:'hero'},
    {x:1510,y:250,w:290,h:150,ic:'watch',t:'Watch & bet'},
    {x:1510,y:465,w:290,h:150,ic:'play',t:'Play fantasy'},
    {x:1510,y:680,w:290,h:150,ic:'chain',t:'On-chain',cls:'chain'},
  ];
  // conns: [x1,y1,x2,y2], label, mid[x,y], accent
  const CONNS=[
    {p:[410,547,800,547],label:'match data',mid:[605,547]},
    {p:[1120,500,1510,325],label:'odds · bet',mid:[1318,398]},
    {p:[1120,547,1510,540],label:'squad · result',mid:[1315,528]},
    {p:[1120,595,1510,755],label:'settle · payout',mid:[1318,660],accent:true},
  ];

  function bez(p){const [x1,y1,x2,y2]=p,dx=Math.max(70,Math.abs(x2-x1)*0.5);return `M ${x1} ${y1} C ${x1+dx} ${y1}, ${x2-dx} ${y2}, ${x2} ${y2}`;}

  document.querySelectorAll('.frame[data-var]').forEach(f=>{
    const svg=f.querySelector('.links'), cards=f.querySelector('.cards');
    // thin neutral wires + subtle end pads
    CONNS.forEach(c=>{
      const d=bez(c.p);
      svg.appendChild(el('path',{d,fill:'none',stroke:'rgba(255,255,255,.16)','stroke-width':1.6,'stroke-linecap':'round'}));
      [[c.p[0],c.p[1]],[c.p[2],c.p[3]]].forEach(pt=>svg.appendChild(el('circle',{cx:pt[0],cy:pt[1],r:4,fill:'#0a0b0d',stroke:c.accent?'#aef019':'rgba(255,255,255,.28)','stroke-width':1.6})));
    });
    // cards
    cards.innerHTML=NODES.map(n=>`<div class="card ${n.cls||''}" style="left:${n.x}px;top:${n.y}px;width:${n.w}px;height:${n.h}px">
      ${n.tag?`<div class="tag">${n.tag}</div>`:''}<div class="ic">${svgIcon(n.ic)}</div>
      <div class="t">${n.t}</div>${n.s?`<div class="s">${n.s}</div>`:''}</div>`).join('')
      // fixed data labels
      + CONNS.map(c=>`<div class="pill ${c.accent?'accent':''}" style="left:${c.mid[0]}px;top:${c.mid[1]}px"><span class="dot"></span>${c.label}</div>`).join('');
  });
</script>
</body>
</html>
