<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1920, initial-scale=1" />
<title>Hatrick — Divider · Live (1920×1008)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root{--neon:#aef019;--foreground:#f2f3f5;--muted:#8b8d94;--sans:'Inter',system-ui,sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#050506;font-family:var(--sans);-webkit-font-smoothing:antialiased;}
  .frame{position:relative;width:1920px;height:1008px;overflow:hidden;background:#0a0b0d;
    display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:0;}
  /* soft ambient + bottom-left arc, like the reference */
  .frame::before{content:'';position:absolute;inset:0;
    background:radial-gradient(900px 600px at 50% 42%, rgba(174,240,25,.05), transparent 70%);}
  .frame::after{content:'';position:absolute;left:-140px;bottom:-140px;width:300px;height:300px;border-radius:999px;
    background:radial-gradient(circle at 60% 40%, rgba(255,255,255,.06), transparent 62%);}
  .mark{position:relative;width:74px;height:auto;margin-bottom:70px;
    filter:drop-shadow(0 0 22px rgba(174,240,25,.35));}
  h1{position:relative;font-size:96px;font-weight:800;letter-spacing:-2.4px;line-height:1;color:var(--foreground);}
  h1 .num{color:var(--foreground);font-weight:900;margin-right:6px;}
  .sub{position:relative;margin-top:30px;font-size:34px;font-weight:500;color:var(--muted);letter-spacing:-.3px;}
  .sub .n{color:var(--neon);font-weight:700;}
</style>
</head>
<body>
<div class="frame">
  <img class="mark" src="assets/logo.png" alt="Hatrick" />
  <h1><span class="num">01.</span>Live</h1>
  <p class="sub">For fans who want to <span class="n">watch and bet, live</span></p>
</div>
</body>
</html>
